<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="300" rx="12" fill="url(#bg)"/>

  <!-- 网格装饰 -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/><line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/><line x1="800" y1="0" x2="800" y2="300"/>
  </g>

  <!-- 设备图标 - 左侧笔记本 -->
  <g transform="translate(100, 85)">
    <rect x="0" y="0" width="80" height="55" rx="4" fill="#1e1e30" stroke="#3b3b5c" stroke-width="1.5"/>
    <rect x="6" y="5" width="68" height="38" rx="2" fill="#12121f"/>
    <text x="40" y="28" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed">copy()</text>
    <rect x="15" y="48" width="50" height="4" rx="2" fill="#3b3b5c"/>
    <!-- 光标闪烁 -->
    <rect x="55" y="18" width="2" height="14" fill="#06b6d4" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- 设备图标 - 右侧台式机 -->
  <g transform="translate(720, 75)">
    <rect x="0" y="0" width="90" height="60" rx="4" fill="#1e1e30" stroke="#3b3b5c" stroke-width="1.5"/>
    <rect x="5" y="4" width="80" height="44" rx="2" fill="#12121f"/>
    <text x="45" y="30" text-anchor="middle" font-family="monospace" font-size="9" fill="#06b6d4">paste()</text>
    <rect x="30" y="56" width="30" height="6" rx="1" fill="#3b3b5c"/>
    <rect x="20" y="62" width="50" height="3" rx="1.5" fill="#3b3b5c"/>
  </g>

  <!-- 中间连接线（带数据流动效果） -->
  <g filter="url(#glow)">
    <line x1="195" y1="115" x2="710" y2="108" stroke="url(#accent)" stroke-width="2" stroke-dasharray="8,6" opacity="0.6">
      <animate attributeName="stroke-dashoffset" values="0;-28" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <!-- 数据包 -->
    <circle r="4" fill="#06b6d4" opacity="0.9">
      <animateMotion dur="1.5s" repeatCount="indefinite"
        path="M195,115 L710,108"/>
    </circle>
    <circle r="3" fill="#7c3aed" opacity="0.7">
      <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.5s"
        path="M195,115 L710,108"/>
    </circle>
  </g>

  <!-- 中间设备 - 手机 -->
  <g transform="translate(415, 155)">
    <rect x="0" y="0" width="35" height="58" rx="6" fill="#1e1e30" stroke="#3b3b5c" stroke-width="1.5"/>
    <rect x="3" y="8" width="29" height="38" rx="2" fill="#12121f"/>
    <circle cx="17.5" cy="51" r="2.5" fill="none" stroke="#3b3b5c" stroke-width="1"/>
    <text x="17.5" y="32" text-anchor="middle" font-family="monospace" font-size="6" fill="#a78bfa">📋</text>
  </g>

  <!-- 连接线到手机 -->
  <line x1="280" y1="130" x2="420" y2="175" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,4" opacity="0.3">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="680" y1="120" x2="455" y2="175" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,4" opacity="0.3">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- 标题 -->
  <text x="450" y="52" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="48" fill="url(#accent)" filter="url(#glow)">PaseBoard</text>

  <!-- 副标题 -->
  <text x="450" y="80" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#94a3b8" letter-spacing="3">LAN CLIPBOARD SYNC</text>

  <!-- 底部特性标签 -->
  <g transform="translate(450, 250)" text-anchor="middle">
    <g transform="translate(-280, 0)">
      <rect x="-45" y="-12" width="90" height="24" rx="12" fill="#7c3aed" opacity="0.15"/>
      <text font-family="-apple-system, sans-serif" font-size="11" fill="#a78bfa">零配置</text>
    </g>
    <g transform="translate(-170, 0)">
      <rect x="-45" y="-12" width="90" height="24" rx="12" fill="#06b6d4" opacity="0.15"/>
      <text font-family="-apple-system, sans-serif" font-size="11" fill="#67e8f9">实时同步</text>
    </g>
    <g transform="translate(-60, 0)">
      <rect x="-45" y="-12" width="90" height="24" rx="12" fill="#7c3aed" opacity="0.15"/>
      <text font-family="-apple-system, sans-serif" font-size="11" fill="#a78bfa">图片支持</text>
    </g>
    <g transform="translate(55, 0)">
      <rect x="-50" y="-12" width="100" height="24" rx="12" fill="#06b6d4" opacity="0.15"/>
      <text font-family="-apple-system, sans-serif" font-size="11" fill="#67e8f9">加密传输</text>
    </g>
    <g transform="translate(170, 0)">
      <rect x="-45" y="-12" width="90" height="24" rx="12" fill="#7c3aed" opacity="0.15"/>
      <text font-family="-apple-system, sans-serif" font-size="11" fill="#a78bfa">跨平台</text>
    </g>
    <g transform="translate(280, 0)">
      <rect x="-40" y="-12" width="80" height="24" rx="12" fill="#06b6d4" opacity="0.15"/>
      <text font-family="-apple-system, sans-serif" font-size="11" fill="#67e8f9">&lt; 50MB</text>
    </g>
  </g>

  <!-- 右上角装饰点 -->
  <circle cx="830" cy="30" r="3" fill="#7c3aed" opacity="0.4"/>
  <circle cx="850" cy="30" r="2" fill="#06b6d4" opacity="0.3"/>
  <circle cx="840" cy="50" r="2" fill="#7c3aed" opacity="0.2"/>

  <!-- 左下角装饰点 -->
  <circle cx="70" cy="270" r="3" fill="#06b6d4" opacity="0.4"/>
  <circle cx="50" cy="270" r="2" fill="#7c3aed" opacity="0.3"/>
  <circle cx="60" cy="250" r="2" fill="#06b6d4" opacity="0.2"/>
</svg>
